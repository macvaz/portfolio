<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alpha Plans — Management</title>
    <link rel="stylesheet" href="/static/style.css?v=10" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" defer></script>
  </head>
  <body>
    <header class="top-bar">
      <div class="top-bar-inner">
        <img src="/static/logo.png" alt="Alpha Plans" class="site-logo" />
        <a href="#" id="logout" hidden>logout</a>
      </div>
    </header>

    <main>
      <section id="auth-section">
        <p class="subtitle">Sign in to view your management dashboard.</p>
        <p id="auth-error" class="auth-error" hidden></p>
        <div id="auth-forms">
          <form id="login-form" class="auth-form">
            <h3>Log in</h3>
            <input id="login-email" type="email" placeholder="Email" required />
            <input id="login-password" type="password" placeholder="Password" required />
            <button type="submit">Log in</button>
          </form>
          <form id="register-form" class="auth-form">
            <h3>Register</h3>
            <input id="register-email" type="email" placeholder="Email" required />
            <input
              id="register-password"
              type="password"
              placeholder="Password (min 8 chars)"
              minlength="8"
              required
            />
            <button type="submit" class="secondary">Register</button>
          </form>
        </div>
      </section>

      <section id="app-section" hidden>
        <div id="management-loading" class="management-loading">Loading dashboard…</div>

        <div id="management-view" hidden>
          <section class="chart-panel">
            <div class="chart-legend">
              <span class="legend-item legend-portfolio">Portfolio</span>
              <span class="legend-item legend-benchmark" id="benchmark-legend">S&amp;P 500</span>
            </div>
            <div class="chart-wrapper">
              <canvas id="performance-chart" aria-label="Portfolio performance chart"></canvas>
            </div>
          </section>

          <section class="table-panel">
            <h2 class="table-title">Portfolio</h2>
            <div class="table-scroll">
              <table class="fund-table" id="portfolio-table">
                <thead>
                  <tr>
                    <th class="col-name">Name</th>
                    <th>Weight (%)</th>
                    <th>β (6m)</th>
                    <th>Cor (6m)</th>
                    <th>Vol (1y)</th>
                    <th>% 1m</th>
                    <th>% 3m</th>
                    <th>% 6m</th>
                    <th>% YTD</th>
                    <th>SR 6m</th>
                    <th>SR 1y</th>
                  </tr>
                </thead>
                <tbody id="portfolio-body"></tbody>
                <tfoot id="portfolio-summary"></tfoot>
              </table>
            </div>
          </section>

          <section class="table-panel">
            <h2 class="table-title">Favorites</h2>
            <div class="table-scroll">
              <table class="fund-table" id="favorites-table">
                <thead>
                  <tr>
                    <th class="col-name">Name</th>
                    <th>Weight (%)</th>
                    <th>β (6m)</th>
                    <th>Cor (6m)</th>
                    <th>Vol (1y)</th>
                    <th>% 1m</th>
                    <th>% 3m</th>
                    <th>% 6m</th>
                    <th>% YTD</th>
                    <th>SR 6m</th>
                    <th>SR 1y</th>
                  </tr>
                </thead>
                <tbody id="favorites-body"></tbody>
              </table>
            </div>
          </section>
        </div>
      </section>

      <p id="error" class="error" hidden></p>
    </main>

    <script src="/static/api.js?v=8"></script>
    <script src="/static/management.js?v=8"></script>
    <script src="/static/app.js?v=8"></script>
  </body>
</html>
