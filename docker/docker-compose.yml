x-app-volumes: &app-volumes
  - ../src:/app/src:ro
  - ../html:/app/html:ro
  - ../api.py:/app/api.py:ro
  - ../batch.py:/app/batch.py:ro
  - ../data:/app/data

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: api
    ports:
      - "8000:8000"
    volumes: *app-volumes
    env_file:
      - ../.env

  batch:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: batch
    volumes: *app-volumes
    env_file:
      - ../.env
    profiles:
      - batch
    restart: "no"
